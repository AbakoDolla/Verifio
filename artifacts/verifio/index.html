    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://verifio.app/#organization",
          "name": "Verifio",
          "url": "https://verifio.app",
          "logo": {
            "@type": "ImageObject",
            "url": "https://verifio.app/logo.png",
            "width": 512,
            "height": 512
          },
          "description": "Tiers de confiance pour les paiements Mobile Money dans le commerce social africain (WhatsApp, Instagram).",
          "foundingDate": "2024",
          "areaServed": ["CI", "GH", "SN", "CM", "BJ"],
          "sameAs": ["https://twitter.com/verifio_app", "https://instagram.com/verifio_app"],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "availableLanguage": ["fr", "en"],
            "contactOption": "TollFree"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://verifio.app/#website",
          "url": "https://verifio.app",
          "name": "Verifio",
          "description": "Tiers de confiance Mobile Money pour le commerce social africain",
          "publisher": { "@id": "https://verifio.app/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://verifio.app/?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "FinancialService",
          "@id": "https://verifio.app/#service",
          "name": "Verifio Escrow",
          "description": "Service de paiement en séquestre (escrow) via Mobile Money pour sécuriser les transactions de commerce social en Afrique de l'Ouest.",
          "provider": { "@id": "https://verifio.app/#organization" },
          "areaServed": "West Africa",
          "serviceType": "Escrow Payment Service",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "XOF",
            "description": "Gratuit pendant la période bêta"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Comment fonctionne le paiement escrow Verifio ?",
              "acceptedAnswer": { "@type": "Answer", "text": "L'acheteur dépose les fonds via Mobile Money sur le compte séquestre Verifio. Le vendeur livre. L'acheteur confirme la réception et les fonds sont libérés. En cas de litige, Verifio arbitre et rembourse." }
            },
            {
              "@type": "Question",
              "name": "Quels opérateurs Mobile Money sont supportés ?",
              "acceptedAnswer": { "@type": "Answer", "text": "Verifio supporte MTN Mobile Money, Orange Money et Wave dans les pays d'Afrique de l'Ouest." }
            },
            {
              "@type": "Question",
              "name": "Combien coûte Verifio ?",
              "acceptedAnswer": { "@type": "Answer", "text": "Verifio est entièrement gratuit pendant la période bêta pour les vendeurs et les acheteurs." }
            }
          ]
        }
      ]
    }
    </script>
